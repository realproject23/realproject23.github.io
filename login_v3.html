<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Canvas - 입장하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" rel="stylesheet">
    <style>
        :root, [data-theme="bench"] {
            --bg: #d4cec4; --surface: #d4cec4; --text-main: #333333; --text-muted: #666666;
            --primary: #2A9D8F; --accent: #3B82F6;
            --shadow-out: 8px 8px 16px #aba69e, -8px -8px 16px #fdf6ea;
            --shadow-in: inset 6px 6px 12px #aba69e, inset -6px -6px 12px #fdf6ea;
            --shadow-sm: 4px 4px 8px #aba69e, -4px -4px 8px #fdf6ea;
        }
        [data-theme="mint"] {
            --bg: #EAEEEE; --surface: #EAEEEE; --text-main: #333333; --text-muted: #8899A6;
            --primary: #00CFCC; --accent: #9EBCEE;
            --shadow-out: 8px 8px 16px #cdd0d0, -8px -8px 16px #ffffff;
            --shadow-in: inset 6px 6px 12px #cdd0d0, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #cdd0d0, -4px -4px 8px #ffffff;
        }
        [data-theme="peach"] {
            --bg: #FDF6F2; --surface: #FDF6F2; --text-main: #5C4B41; --text-muted: #8A786E;
            --primary: #E89A86; --accent: #E89A86;
            --shadow-out: 9px 9px 18px #e8e2de, -9px -9px 18px #ffffff;
            --shadow-in: inset 6px 6px 12px #e8e2de, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #e8e2de, -4px -4px 8px #ffffff;
        }
        [data-theme="blue"] {
            --bg: #E8F0F8; --surface: #E8F0F8; --text-main: #1E3A8A; --text-muted: #64748B;
            --primary: #3B82F6; --accent: #60A5FA;
            --shadow-out: 8px 8px 16px #cfd7df, -8px -8px 16px #ffffff;
            --shadow-in: inset 6px 6px 12px #cfd7df, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #cfd7df, -4px -4px 8px #ffffff;
        }
        
        body { font-family: 'NanumSquareNeo', sans-serif; background-color: var(--bg); color: var(--text-main); transition: background-color 0.4s ease; }
        .neu-card { background-color: var(--surface); box-shadow: var(--shadow-out); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.4); } 
        .shadow-in { box-shadow: var(--shadow-in); }
        .btn-accent { background-color: var(--primary); box-shadow: var(--shadow-sm); color: white; transition: all 0.2s ease; cursor: pointer; border: none; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn-accent:hover { filter: brightness(1.03); transform: translateY(-1px); }
        .btn-accent:active { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.1); transform: translateY(1px); }
        .input-field { background-color: var(--surface); box-shadow: var(--shadow-in); border: 2px solid transparent; color: var(--text-main); transition: all 0.3s ease; }
        .input-field:focus { border-color: var(--primary); outline: none; }
        .tab-btn { color: var(--text-muted); transition: all 0.3s ease; }
        .tab-btn.active { color: var(--primary); font-weight: 900; box-shadow: var(--shadow-in); background-color: var(--surface); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.4); }
    </style>
    <script src="i18n.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="neu-card w-full max-w-md p-8 sm:p-10 transition-transform duration-300 relative">
        <div class="absolute top-6 left-6 flex items-center gap-3">
             <button onclick="window.location.href='index.html'" class="text-[var(--text-muted)] hover:text-[var(--primary)] transition flex items-center gap-1">
                <span data-i18n="login_home" class="text-[17px] font-black">🏠 홈으로</span>
            </button>
            <div class="flex items-center gap-1 ui-shadow-in px-2 py-1 rounded-full text-[12px] font-black">
                <button onclick="setLanguage('ko')" data-lang="ko" class="lang-btn px-2 py-0.5 rounded-full transition">KO</button>
                <button onclick="setLanguage('en')" data-lang="en" class="lang-btn px-2 py-0.5 rounded-full transition">EN</button>
            </div>
        </div>
        <button onclick="window.location.href='index.html'" class="absolute top-6 right-6 text-2xl text-gray-400 hover:text-gray-600 font-bold">&times;</button>

        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-full neu-card flex items-center justify-center text-2xl font-black text-[var(--primary)] border-2 border-[var(--primary)] border-opacity-30">Y</div>
        </div>
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tight mb-2 text-[var(--text-main)]">Youth Canvas</h1>
            <p data-i18n="platform_title" class="text-[var(--text-muted)] text-[15px] font-bold">청소년 시설 통합 관리 시스템</p>
        </div>

        <div class="flex rounded-2xl p-1 mb-8" style="background-color: var(--surface); box-shadow: var(--shadow-sm);">
            <button id="tab-login" data-i18n="login_tab_member" class="tab-btn active flex-1 py-3 text-[17px] font-bold text-center" onclick="switchTab('login')">기존 회원 로그인</button>
            <button id="tab-signup" data-i18n="login_tab_new" class="tab-btn flex-1 py-3 text-[17px] font-bold text-center" onclick="switchTab('signup')">신규 수강신청</button>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label data-i18n="login_id_label" class="block text-[15px] font-bold text-[var(--text-muted)] mb-2 ml-2">아이디 (이름)</label>
                <input type="text" id="loginName" data-i18n-ph="login_id_ph" placeholder="등록된 이름을 입력해주세요" required class="input-field w-full px-5 py-4 rounded-2xl font-bold text-[17px]">
            </div>
            <div>
                <label data-i18n="login_pin_label" class="block text-[15px] font-bold text-[var(--text-muted)] mb-2 ml-2">PIN 번호</label>
                <input type="password" id="loginPin" data-i18n-ph="login_pin_ph" placeholder="비밀번호" required class="input-field w-full px-5 py-4 rounded-2xl font-bold text-[17px]">
            </div>
            <p id="loginError" class="text-red-500 text-[15px] font-bold hidden text-center bg-red-50 p-2 rounded-lg border border-red-100"></p>
            <button type="submit" data-i18n="login_btn" class="btn-accent w-full font-extrabold py-4 rounded-2xl mt-4 text-[17px]">시스템 입장하기</button>
        </form>

        <form id="signupForm" class="space-y-5 hidden">
            <div>
                <label data-i18n="signup_prog_label" class="block text-[15px] font-bold text-[var(--text-muted)] mb-2 ml-2">지원 프로그램 선택</label>
                <select id="signupProgram" required class="input-field w-full px-5 py-4 rounded-2xl font-bold text-[17px] appearance-none">
                    <option value="" data-i18n="signup_prog_loading">프로그램을 불러오는 중...</option>
                </select>
            </div>
            <div>
                <label data-i18n="signup_name_label" class="block text-[15px] font-bold text-[var(--text-muted)] mb-2 ml-2">학생 이름 (실명)</label>
                <input type="text" id="signupName" data-i18n-ph="signup_name_ph" placeholder="예: 홍길동" required class="input-field w-full px-5 py-4 rounded-2xl font-bold text-[17px]">
            </div>
            <div>
                <label data-i18n="signup_pin_label" class="block text-[15px] font-bold text-[var(--text-muted)] mb-2 ml-2">사용할 PIN 번호 (4자리)</label>
                <input type="password" id="signupPin" data-i18n-ph="signup_pin_ph" placeholder="기억하기 쉬운 번호 입력" required class="input-field w-full px-5 py-4 rounded-2xl font-bold text-[17px]">
            </div>
            <p id="signupError" class="text-red-500 text-[15px] font-bold hidden text-center bg-red-50 p-2 rounded-lg border border-red-100"></p>
            <button type="submit" data-i18n="signup_btn" class="btn-accent w-full font-extrabold py-4 rounded-2xl mt-4 text-[17px]">이 프로그램 지원하기</button>
        </form>

    </div>

    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('youth_canvas_main_theme') || 'bench');

        const API_BASE_URL = "http://127.0.0.1:8000";

        // 탭 전환 로직
        function switchTab(tab) {
            if(tab === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-signup').classList.remove('active');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('signupForm').classList.remove('hidden');
                document.getElementById('loginForm').classList.add('hidden');
                loadProgramsForSignup(); // 수강신청 탭 누를 때 프로그램 목록 불러오기
            }
        }

        // 수강신청용 프로그램 목록 로드
        function loadProgramsForSignup() {
            const selectEl = document.getElementById('signupProgram');
            fetch(`${API_BASE_URL}/api/programs`)
                .then(res => res.json())
                .then(data => {
                    selectEl.innerHTML = `<option value="">${getI18nText('signup_prog_select')}</option>`;
                    data.forEach(p => {
                        selectEl.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                    });
                })
                .catch(() => { selectEl.innerHTML = `<option value="">${getI18nText('cal_fail')}</option>`; });
        }

        // 1. 기존 회원 로그인 처리
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const name = document.getElementById('loginName').value.trim();
            const pin = document.getElementById('loginPin').value.trim();
            const errorMsg = document.getElementById('loginError');
            
            errorMsg.classList.add('hidden'); 

            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, pin: pin })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('youth_canvas_token', data.access_token); 
                    localStorage.setItem('youth_canvas_user', JSON.stringify(data.user)); 
                    
                    if (data.user.role === 'admin' || data.user.role === 'super') window.location.href = 'admin.html';
                    else if (data.user.role === 'parent') window.location.href = 'parents.html'; 
                    else window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.detail || getI18nText('login_fail'); 
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = getI18nText('server_conn_fail'); 
                errorMsg.classList.remove('hidden');
            }
        });

        // 2. 신규 학생 수강신청 (가입) 처리
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const prog = document.getElementById('signupProgram').value;
            const name = document.getElementById('signupName').value.trim();
            const pin = document.getElementById('signupPin').value.trim();
            const errorMsg = document.getElementById('signupError');
            
            if(!prog) { alert(getI18nText('alert_select_prog')); return; }
            errorMsg.classList.add('hidden'); 

            try {
                const response = await fetch(`${API_BASE_URL}/api/students/signup`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, pin: pin, program: prog })
                });
                
                if (response.ok) {
                    alert(`🎉 ${getI18nText('signup_success_title')}\n[${prog}] ${getI18nText('signup_success_desc')}`);
                    switchTab('login');
                    document.getElementById('loginName').value = name;
                    document.getElementById('loginPin').value = '';
                    document.getElementById('loginPin').focus();
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.detail || getI18nText('signup_fail'); 
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = getI18nText('server_conn_fail'); 
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
