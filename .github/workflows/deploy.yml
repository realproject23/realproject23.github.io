name: 'Project Validation & Auto-Sync (프로젝트 검증 및 자동화)'

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 푸시될 때 실행
  workflow_dispatch: # 수동 실행 활성화

jobs:
  validate-and-notify:
    runs-on: ubuntu-latest # 최신 우분투 환경에서 실행

    steps:
    - name: '1. Checkout Repository (코드 내려받기)'
      uses: actions/checkout@v4

    - name: '2. Set up Python (파이썬 환경 설정)'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: '3. Check File Integrity (파일 무결성 검사)'
      run: |
        echo "Checking core project files..."
        ls -la index.html style.css script.js main.py
        echo "Validation complete (검사 완료)"

    - name: '4. Summary of Changes (변경 내역 요약)'
      run: |
        echo "Latest Commit Information (최신 커밋 정보):"
        git log -1 --pretty=format:"%s by %an (%ar)"
