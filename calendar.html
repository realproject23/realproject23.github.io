<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_calendar">Youth Canvas | 전체 일정 표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="bench"] {
            --bg: #d4cec4; --surface: #d4cec4; --text-main: #333333; --text-muted: #666666;
            --primary: #2A9D8F; --accent: #3B82F6;
            --shadow-out: 14px 14px 28px #aba69e, -14px -14px 28px #fdf6ea;
            --shadow-in: inset 8px 8px 16px #aba69e, inset -8px -8px 16px #fdf6ea;
            --shadow-sm: 6px 6px 12px #aba69e, -6px -6px 12px #fdf6ea;
            --radius-card: 28px; --radius-inner: 18px; --radius-pill: 50px;
        }
        [data-theme="mint"] {
            --bg: #F4F9F8; --surface: #F4F9F8; --text-main: #1F2937; --text-muted: #6B7280;
            --primary: #049D79; --accent: #60A5FA;
            --shadow-out: 12px 12px 24px #dce5e3, -12px -12px 24px #ffffff;
            --shadow-in: inset 6px 6px 12px #dce5e3, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #dce5e3, -4px -4px 8px #ffffff;
        }
        [data-theme="peach"] {
            --bg: #FDF6F2; --surface: #FDF6F2; --text-main: #5C4B41; --text-muted: #8A786E;
            --primary: #E89A86; --accent: #60A5FA;
            --shadow-out: 12px 12px 24px #e8e2de, -12px -12px 24px #ffffff;
            --shadow-in: inset 6px 6px 12px #e8e2de, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #e8e2de, -4px -4px 8px #ffffff;
        }
        [data-theme="blue"] {
            --bg-color: #E8F0F8; --surface: #E8F0F8; --bg: #E8F0F8; --text-main: #1E3A8A; --text-muted: #64748B;
            --primary: #3B82F6; --accent: #3B82F6;
            --shadow-out: 12px 12px 24px #cfd7df, -12px -12px 24px #ffffff;
            --shadow-in: inset 6px 6px 12px #cfd7df, inset -6px -6px 12px #ffffff;
            --shadow-sm: 4px 4px 8px #cfd7df, -4px -4px 8px #ffffff;
        }

        body { font-family: 'Nunito', 'Noto Sans KR', sans-serif; background-color: var(--bg); color: var(--text-main); transition: all 0.5s ease; overflow-x: hidden; }
        .ui-card { background-color: var(--surface); box-shadow: var(--shadow-out); border-radius: var(--radius-card); transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.4); }
        .ui-shadow-in { background-color: var(--surface); box-shadow: var(--shadow-in); }
        .ui-btn { background-color: var(--surface); box-shadow: var(--shadow-sm); color: var(--text-main); transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        .ui-btn:active { box-shadow: var(--shadow-in); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; opacity: 0.3; }
        .keep-all { word-break: keep-all; overflow-wrap: break-word; }

        /* 3D Spheres */
        .sphere { position: absolute; border-radius: 50%; background: var(--surface); box-shadow: var(--shadow-out); z-index: -1; animation: float 6s ease-in-out infinite alternate; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-15px); } }
        
        /* Calendar Specific */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day { min-height: 100px; padding: 8px; border-radius: 12px; transition: all 0.2s; position: relative; display: flex; flex-direction: column; gap: 4px; border: 1px solid rgba(255,255,255,0.4); }
        .cal-day.empty { background: transparent; box-shadow: none; border-color: transparent; }
        .cal-day.active { background: var(--surface); box-shadow: var(--shadow-sm); cursor: pointer; }
        .cal-day.active:hover { box-shadow: var(--shadow-in); }
        .cal-day.today { border: 2px solid var(--primary); }
        
        .event-chip { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: white; margin-bottom: 2px; box-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .lang-btn { transition: all 0.2s; cursor: pointer; }
        .lang-btn.active { box-shadow: var(--shadow-in); background-color: var(--surface); }
    </style>
    <script src="i18n.js"></script>
    <script src="firebase_client.js"></script>
</head>
<body class="relative min-h-screen pt-12 pb-24 px-4 md:px-12 w-full max-w-screen-2xl mx-auto">

    <!-- 3D Decorative Spheres -->
    <div class="sphere hidden lg:block w-32 h-32 top-[10%] left-[5%] opacity-80" style="animation-delay: 0s;"></div>
    <div class="sphere hidden lg:block w-20 h-20 bottom-[20%] right-[10%] opacity-90" style="animation-delay: 1s;"></div>
    <div class="absolute top-[8%] right-[15%] z-[-1] opacity-60 text-4xl text-white drop-shadow-lg hidden md:block">🗓️</div>

    <!-- Top Navigation -->
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-8 relative z-10 w-full px-1">
        <div class="flex gap-6 items-center">
            <a href="index.html" data-i18n="nav_home" class="text-[17px] font-extrabold text-[var(--text-muted)] hover:text-[var(--text-main)] transition pb-1 border-b-2 border-transparent hover:border-[var(--text-main)]">탐색 홈</a>
            <a href="calendar.html" data-i18n="nav_calendar" class="text-[17px] font-black text-[var(--primary)] border-b-2 border-[var(--primary)] pb-1">전체 일정표</a>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[14px] font-extrabold text-[var(--text-muted)] px-3 py-1 ui-shadow-in rounded-[var(--radius-pill)]">B2B SaaS</span>
        </div>
    </nav>

    <!-- Header & Theme -->
    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end mb-12 relative z-10 w-full px-1 gap-6">
        <div>
            <h1 data-i18n="cal_title" class="text-4xl md:text-5xl font-black text-[var(--text-main)] mb-2 tracking-tighter drop-shadow-sm">종합 캘린더</h1>
            <p data-i18n="cal_desc" class="text-[var(--text-main)] font-extrabold text-[17px] opacity-80 keep-all">모든 프로그램의 일정을 한눈에 확인하고 관리하세요.</p>
        </div>
        <div class="flex flex-col items-end gap-3">
             <!-- Language Switcher -->
             <div class="flex items-center gap-2 ui-shadow-in px-4 py-1.5 rounded-full w-max mb-1">
                <button onclick="setLanguage('ko')" data-lang="ko" class="lang-btn px-3 py-1 text-[14px] font-black rounded-full transition">KO</button>
                <button onclick="setLanguage('en')" data-lang="en" class="lang-btn px-3 py-1 text-[14px] font-black rounded-full transition">EN</button>
            </div>
            <div class="flex items-center gap-3 px-5 py-2.5 rounded-full w-max" style="background-color: var(--surface); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.05), inset -3px -3px 6px rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.5);">
                <span data-i18n="themes" class="text-[16px] font-black text-[var(--text-muted)] mr-1">Themes:</span>
                <button onclick="setTheme('bench')" class="theme-dot w-6 h-6 rounded-full border-[2.5px] border-transparent shadow-md transition hover:scale-110" style="background: linear-gradient(135deg, #d2ccc4, #a39b8e);" title="Bench"></button>
                <button onclick="setTheme('mint')" class="theme-dot w-6 h-6 rounded-full border-[2.5px] border-transparent shadow-md transition hover:scale-110" style="background: linear-gradient(135deg, #2A9D8F, #1c7c70);" title="Mint (Default)"></button>
                <button onclick="setTheme('peach')" class="theme-dot w-6 h-6 rounded-full border-[2.5px] border-transparent shadow-md transition hover:scale-110" style="background: linear-gradient(135deg, #ffcba4, #e89a86);" title="Peach"></button>
                <button onclick="setTheme('blue')" class="theme-dot w-6 h-6 rounded-full border-[2.5px] border-transparent shadow-md transition hover:scale-110" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb);" title="Blue"></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto relative z-10 w-full flex flex-col lg:flex-row gap-8">
        <!-- Calendar Grid -->
        <div class="ui-card p-6 md:p-8 flex-1">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="ui-btn w-10 h-10 flex items-center justify-center rounded-xl font-black text-xl hover:text-[var(--primary)]">&lt;</button>
                <h2 id="calendar-title" class="text-2xl font-black text-[var(--text-main)]">2026년 3월</h2>
                <button onclick="changeMonth(dir)" class="ui-btn w-10 h-10 flex items-center justify-center rounded-xl font-black text-xl hover:text-[var(--primary)]" onclick="changeMonth(1)">&gt;</button>
            </div>
            
            <div class="cal-grid mb-2 text-center text-[15px] font-black text-[var(--text-muted)]">
                <div data-i18n="cal_sun" class="text-red-500">일</div>
                <div data-i18n="cal_mon">월</div>
                <div data-i18n="cal_tue">화</div>
                <div data-i18n="cal_wed">수</div>
                <div data-i18n="cal_thu">목</div>
                <div data-i18n="cal_fri">금</div>
                <div data-i18n="cal_sat" class="text-blue-500">토</div>
            </div>
            <div id="calendar-days" class="cal-grid custom-scrollbar min-w-[300px]">
                <!-- Days injected here -->
            </div>
        </div>

        <!-- Right Side Panel (Details) -->
        <div class="w-full lg:w-96 shrink-0 flex flex-col gap-6">
            <div class="ui-card p-6 h-[400px] flex flex-col">
                <h3 data-i18n="cal_detail_title" class="text-lg font-black text-[var(--text-main)] mb-4 border-b border-black/5 pb-3">선택한 날짜 상세</h3>
                <h4 id="detail-date" data-i18n="cal_click_date" class="text-2xl font-black text-[var(--primary)] mb-4 tracking-tight">날짜를 클릭하세요</h4>
                
                <div id="detail-events" class="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-3">
                    <div data-i18n="cal_no_events" class="text-[16px] font-extrabold text-[var(--text-muted)] text-center mt-10">캘린더에서 스케줄이 있는 일자를 클릭하면 상세 요약이 표시됩니다.</div>
                </div>
            </div>
            
            <div class="ui-card p-6 ui-shadow-in relative overflow-hidden text-center">
                <div class="text-3xl mb-2">🎉</div>
                <h3 data-i18n="cal_system_active" class="text-[17px] font-black text-[var(--text-main)] mb-1">통합 관리 시스템 활성화</h3>
                <p data-i18n="cal_system_desc" class="text-[14px] font-extrabold text-[var(--text-muted)] keep-all">캘린더 연동, 알림 방송, 출석 체크가 자동으로 동기화되고 있습니다.</p>
            </div>
        </div>
    </main>

    <script>
        // Theme init
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('youth_canvas_main_theme', theme);
            document.querySelectorAll('.theme-dot').forEach(btn => { btn.style.borderColor = 'transparent'; btn.style.transform = 'scale(1)'; });
            const targetBtn = document.querySelector(`.theme-dot[onclick="setTheme('${theme}')"]`);
            if (targetBtn) { targetBtn.style.borderColor = 'rgba(255,255,255,0.95)'; targetBtn.style.transform = 'scale(1.15)'; }
        }
        setTheme(localStorage.getItem('youth_canvas_main_theme') || 'bench');

        let currentDate = new Date();
        let eventsMap = {}; 
        const colors = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#6366F1', '#EC4899', '#8B5CF6'];

        const API_BASE_URL = "https://realproject23-api.onrender.com";

        async function initCalendar() {
            try {
                // Use the global fbGetPrograms function from firebase_client.js
                const programs = await window.fbGetPrograms();
                
                programs.forEach((prog, idx) => {
                    const color = prog.color || colors[idx % colors.length];
                    if (prog.workflow) {
                        const lines = prog.workflow.split('\n');
                        lines.forEach(line => {
                            const trimmed = line.trim();
                            const dateMatch = trimmed.match(/(\d{4}-\d{2}-\d{2})/);
                            if (dateMatch) {
                                const dateStr = dateMatch[1];
                                let timeStr = getI18nText('cal_all_day');
                                const timeMatch = trimmed.match(/\[(.*?)\]|\((.*?)\)/); 
                                if (timeMatch) timeStr = timeMatch[1] || timeMatch[2];
                                
                                let desc = trimmed.replace(dateStr, '').replace(`[${timeStr}]`, '').replace(`(${timeStr})`, '').replace(/^[:\-\s]+/, '');
                                
                                if (!eventsMap[dateStr]) eventsMap[dateStr] = [];
                                eventsMap[dateStr].push({ progName: prog.name, time: timeStr, desc: desc, color: color });
                            }
                        });
                    }
                });
                renderCalendar();
            } catch (e) {
                console.error("Failed to fetch programs from Firebase", e);
                const container = document.getElementById('calendar-days');
                if(container) container.innerHTML = `<div class="col-span-7 font-black text-center text-red-500 py-10">${getI18nText('cal_fail')}</div>`;
            }
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const lang = localStorage.getItem('yc_language') || 'ko';
            
            if (lang === 'ko') {
                document.getElementById('calendar-title').innerText = `${year}${getI18nText('cal_year_unit')} ${month + 1}${getI18nText('cal_month_unit')}`;
            } else {
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                document.getElementById('calendar-title').innerText = `${monthNames[month]} ${year}`;
            }
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const container = document.getElementById('calendar-days');
            if(!container) return;
            container.innerHTML = '';
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            
            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="cal-day empty"></div>`;
            }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const evts = eventsMap[dateStr] || [];
                
                let evtHtml = '';
                evts.slice(0, 3).forEach(e => {
                    evtHtml += `<div class="event-chip" style="background-color: ${e.color};">${e.progName}</div>`;
                });
                if (evts.length > 3) {
                    evtHtml += `<div class="text-[12px] font-black text-center text-[var(--text-muted)] mt-1">+${evts.length - 3} ${getI18nText('cal_more')}</div>`;
                }

                const isToday = isCurrentMonth && today.getDate() === d;
                const clazz = `cal-day active ${isToday ? 'today' : ''}`;
                
                container.innerHTML += `
                    <div class="${clazz}" onclick="showDetails('${dateStr}')">
                        <div class="text-[16px] font-black text-[var(--text-main)] mb-1" style="${(firstDay + d - 1)%7===0 ? 'color: #EF4444' : (firstDay + d - 1)%7===6 ? 'color: #3B82F6' : ''}">${d}</div>
                        <div class="flex flex-col gap-0.5 w-full overflow-hidden">${evtHtml}</div>
                    </div>
                `;
            }
        }

        function showDetails(dateStr) {
            const detailDate = document.getElementById('detail-date');
            if(detailDate) detailDate.innerText = dateStr;
            const evts = eventsMap[dateStr] || [];
            const container = document.getElementById('detail-events');
            if(!container) return;
            container.innerHTML = '';
            
            if (evts.length === 0) {
                container.innerHTML = `<div class="text-[16px] font-extrabold text-[var(--text-muted)] text-center mt-4 keep-all">${getI18nText('cal_no_sched')}</div>`;
                return;
            }
            
            evts.forEach(e => {
                container.innerHTML += `
                    <div class="p-4 rounded-2xl border border-white/40 bg-white/30 backdrop-blur-md shadow-sm transition-all hover:scale-[1.02] cursor-pointer group mb-2" onclick="joinProgram('${e.progName}')">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${e.color}"></span>
                            <span class="text-[17px] font-black text-[var(--text-main)] group-hover:text-[var(--primary)] transition">${e.progName}</span>
                            <span class="ml-auto text-[13px] font-black bg-white/50 px-2 py-0.5 rounded-full border border-white/60">${e.time}</span>
                        </div>
                        <p class="text-[15px] font-extrabold text-[var(--text-main)] opacity-70 pl-5 mb-3 leading-snug">${e.desc}</p>
                        <div class="flex justify-end pr-1">
                            <span class="text-[13px] font-black text-[var(--primary)] flex items-center gap-1">${getI18nText('cal_view_apply')} ➜</span>
                        </div>
                    </div>
                `;
            });
        }

        window.joinProgram = function(name) {
            window.location.href = `index.html?search=${encodeURIComponent(name)}`;
        }

        document.addEventListener('DOMContentLoaded', initCalendar);
    </script>
</body>
</html>
